# ai-career-toolkit configuration
# Copy this file to config/settings.yaml and customize for your search.
#
# NOTE: This file is read by AI agents as context for your preferences.
# It is NOT consumed by setup.sh or install.sh — those scripts work
# independently. Think of this as your "profile" that skills like
# target-list-generator and opportunity-evaluator reference.

# Which AI platform you're using (for agent reference, not used by scripts)
# Supported: cursor, claude-code
platform: cursor

# Target company list generation parameters
targeting:
  domains:
    # - AI/ML
    # - developer tools
    # - climate tech
    # - healthcare
    # - enterprise SaaS
    # - fintech
    # - cybersecurity
    # - edtech
    # - infrastructure
  company_stages:
    # - early-stage
    # - growth-stage
    # - late-stage
    # - public-scale
    # - nonprofit

  # Role: technical IC track (v1 kit is optimized for these)
  # Examples: Software Engineer, Site Reliability Engineer, Data Engineer, ML Engineer
  role: Software Engineer

  # Level: seniority within the IC track
  # Examples: Mid-level, Senior, Staff, Sr Staff, Principal, Distinguished
  level: Staff

  geo_remote:
    # - remote-first
    # - hybrid
    # - onsite
    # - NYC
    # - SF Bay Area
    # - Seattle
    # - Austin
    # - London
    # - anywhere-US
  exclusions:
    # - crypto
    # - defense
    # - pre-seed
    # - gambling

# Active skills (all enabled by default)
skills:
  - content-review
  - hm-review
  - in-my-voice
  - mock-interview-loop
  - opportunity-evaluator
  - social-content
  - star-story
  - target-list-generator
  - tech-content-review
