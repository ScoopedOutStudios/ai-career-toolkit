# ai-career-toolkit configuration
# Copy this file to config/settings.yaml and customize for your search.
#
# NOTE: This file is read by AI agents as context for your preferences.
# It is NOT consumed by setup.sh or install.sh — those scripts work
# independently. Think of this as your "profile" that skills like
# target-list-generator and opportunity-evaluator reference.
#
# TIP: Run `ai-career-toolkit init` to fill these fields interactively,
# or `ai-career-toolkit personalize` to update them later.

# Which AI platform you're using (for agent reference, not used by scripts)
# Supported: cursor, claude-code
platform: cursor

# Target company list generation parameters
targeting:
  domains:
    # Used by: target-list-generator, research-guru, opportunity-evaluator
    # If empty: target-list-generator will ask you interactively each time;
    #           opportunity-evaluator skips domain-fit scoring.
    # Examples (uncomment the ones that fit):
    # - AI/ML
    # - developer tools
    # - climate tech
    # - healthcare
    # - enterprise SaaS
    # - fintech
    # - cybersecurity
    # - edtech
    # - infrastructure
  company_stages:
    # Used by: target-list-generator
    # If empty: all stages are considered; no filtering applied.
    # - early-stage
    # - growth-stage
    # - late-stage
    # - public-scale
    # - nonprofit

  # Used by: target-list-generator, opportunity-evaluator, hm-review
  # Controls which rubric dimensions and JD signals are prioritized.
  # If missing: skills default to generic "Software Engineer" context.
  role: # e.g., Software Engineer, Site Reliability Engineer, ML Engineer

  # Used by: opportunity-evaluator (level-match check), hm-review (calibration),
  #          mock-interview-loop (question difficulty), career-guide (trajectory)
  # If missing: skills cannot calibrate for seniority — feedback will be generic.
  level: # e.g., Senior, Staff, Sr Staff, Principal

  geo_remote:
    # Used by: target-list-generator (location filtering), opportunity-evaluator (fit check)
    # If empty: no location filtering; all geographies considered.
    # - remote-first
    # - hybrid
    # - onsite
    # - NYC
    # - SF Bay Area
    # - Seattle
    # - Austin
    # - London
    # - anywhere-US
  exclusions:
    # Used by: target-list-generator (hard filter), opportunity-evaluator (quick-reject)
    # If empty: nothing excluded; all companies considered.
    # - crypto
    # - defense
    # - pre-seed
    # - gambling

# Active skills (all enabled by default)
skills:
  - content-review
  - hm-review
  - in-my-voice
  - mock-interview-loop
  - opportunity-evaluator
  - resume-bootstrap
  - social-content
  - star-story
  - target-list-generator
  - tech-content-review
